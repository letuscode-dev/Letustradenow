name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm test -- --collectCoverage=false --passWithNoTests

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_DERIV_APP_ID: ci_placeholder_app_id
          NEXT_PUBLIC_DERIV_ENV: production
          NEXT_PUBLIC_DERIV_APP_NAME: Letustradenow
